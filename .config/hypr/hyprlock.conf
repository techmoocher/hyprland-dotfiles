#source=~/.config/hypr/hyprlock/colors.conf

general {
    hide_cursor = true
    ignore_empty_input = true
    fail_timeout = 3000
}

background {
    path = $HOME/.config/hypr/hyprlock/images/cherry-blossom-subway.png
    color = rgba(00000020)
    blur_passes = 2
    blur_size = 6
    vignette = true
    vignette_inner = 0.2
    vignette_outer = 0.9
}

input-field {
    size = 320, 52
    outline_thickness = 2

    dots_size = 0.25
    dots_spacing = 0.35
    outer_color = $entry_border_color
    inner_color = $entry_background_color
    font_color = $entry_color
    font_size = 15

    rounding = 12
    fade_on_empty = true

    position = 0, -80
    halign = center
    valign = center
}

# Time
label {
    #text = cmd[update:1000] date +"%I:%M %p"
    text = $TIME
    color = $text_color
    font_size = 100
    font_family = $font_family_clock

    position = 0, 250
    halign = center
    valign = center
}

# Date
label {
    text = cmd[update:5000] date +"%A, %B %d, %Y"
    color = $text_color
    font_size = 30
    font_family = $font_family_clock

    position = 0, 150
    halign = center
    valign = center
}

# User
label {
    text =    $USER
    color = $text_color
    font_size = 22
    outline_thickness = 2
    #dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    #dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    #dots_center = true
    font_family = $font_family
    position = 0, 75
    halign = center
    valign = bottom
}

# Keyboard layout
label {
    text = $LAYOUT
    color = $text_color
    font_size = 14
    font_family = $font_family
    position = -40, 30
    halign = right
    valign = bottom
}

# Caps lock check
label {
    text = cmd[update:250] ${XDG_CONFIG_HOME:-$HOME/.config}/hypr/hyprlock/check-capslock.sh
    color = $text_color
    font_size = 14
    font_family = $font_family
    position = 0, -25
    halign = center
    valign = center
}

# Battery
label {
    text = cmd[update:5000] ${XDG_CONFIG_HOME:-$HOME/.config}/hypr/hyprlock/battery.sh
    use_markup = true
    font_family = $font_family
    font_size = 16
    position = -40, -30
    halign = right
    valign = top
}
